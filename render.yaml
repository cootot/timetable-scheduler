# render.yaml — Render Blueprint for automatic deployment
services:
  - type: web
    name: timetable-backend
    runtime: python
    region: oregon
    buildCommand: |
      cd backend
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
      python manage.py migrate --database=audit_db
    startCommand: cd backend && gunicorn timetable_project.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: timetable-db
          property: connectionString
      - key: AUDIT_DATABASE_URL
        fromDatabase:
          name: timetable-audit-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.13.0"

databases:
  - name: timetable-db
    plan: free
  - name: timetable-audit-db
    plan: free
